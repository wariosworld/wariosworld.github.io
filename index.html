<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Beez's Portfolio</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

:root{
--accent:#f5c518;
--bg:#0a0a0a;
--text:#f0ece4;
--muted:rgba(240,236,228,0.6);
}

body{
background:var(--bg);
color:var(--text);
font-family:"DM Sans",sans-serif;
overflow:hidden;
}

#feed{
height:100vh;
overflow-y:scroll;
scroll-snap-type:y mandatory;
}

.reel{
height:100vh;
scroll-snap-align:start;
display:flex;
flex-direction:column;
align-items:center;
justify-content:flex-start;
padding-top:50px;
gap:30px;
}

/* PROFILE */

.profile{
text-align:center;
}

.profile img{
width:120px;
height:120px;
border-radius:50%;
border:3px solid var(--accent);
margin-bottom:15px;
}

/* MEDIA AREA */

.gallery{
display:flex;
gap:30px;
overflow-x:auto;
scroll-snap-type:x mandatory;
padding-bottom:20px;
max-width:95vw;
}

.gallery::-webkit-scrollbar{
height:14px;
}

.gallery::-webkit-scrollbar-track{
background:#222;
border-radius:10px;
}

.gallery::-webkit-scrollbar-thumb{
background:var(--accent);
border-radius:10px;
}

.gallery img,
.gallery video{
scroll-snap-align:center;
max-height:55vh;
max-width:70vw;
object-fit:contain;
border-radius:18px;
}

/* APP INFO */

.info{
text-align:center;
max-width:600px;
}

.badge{
color:var(--accent);
font-size:13px;
margin-bottom:6px;
}

.title{
font-family:"Bebas Neue";
font-size:46px;
}

.desc{
color:var(--muted);
margin-top:10px;
}

/* BUTTONS */

.actions{
display:flex;
gap:12px;
flex-wrap:wrap;
justify-content:center;
}

.btn{
background:rgba(255,255,255,0.1);
padding:10px 16px;
border-radius:30px;
text-decoration:none;
color:white;
font-size:13px;
border:none;
cursor:pointer;
}

/* PRIVACY MODAL */

#modal{
position:fixed;
bottom:-100%;
left:0;
right:0;
background:#161616;
padding:30px;
transition:.3s;
max-height:70vh;
overflow:auto;
}

#modal.open{
bottom:0;
}

</style>
</head>

<body>

<div id="feed"></div>
<div id="modal"></div>

<script>

const profile={
name:"Beez Picasso",
handle:"iOS Developer",
avatar:"img/logo.jpg",
bio:"I build clean iOS apps blending history, creativity and productivity.",
email:"bsolom15@terpmail.umd.edu"
}

const apps=[

{
title:"Melanin Sun Ring",
badge:"Free iOS App",
description:"A sunlight activity ring designed for melanin-rich skin.",
video:"vid/melanin-sun-ring.mp4",
images:[
"img/melanin-sun-ring.png",
"img/melanin-sun-ring2.png",
"img/melanin-sun-ring3.png",
"img/melanin-sun-ring4.png",
"img/melanin-sun-ring5.png"
],
appStore:null,
privacy:"Melanin Sun Ring does not collect any user data.",
tos:"https://www.apple.com/legal/internet-services/itunes/dev/stdeula/"
},

{
title:"Percentage Clock",
badge:"$1.99 iOS App",
description:"Experience time differently by viewing the day as a percentage.",
video:"vid/percentage-clock-video.mp4",
images:[
"img/percentage-clock1.png",
"img/percentage-clock2.png",
"img/percentage-clock3.png",
"img/percentage-clock.png"
],
appStore:"https://apps.apple.com/us/app/percentage-clock/id1635013231",
privacy:"Percentage Clock collects no personal data.",
tos:"https://www.apple.com/legal/internet-services/itunes/dev/stdeula/"
},

{
title:"My Name in Hieroglyphics",
badge:"$1.99 iOS App",
description:"Turn your name into ancient Egyptian hieroglyphs.",
video:null,
images:[
"img/my-name-hieroglyphics.png"
],
appStore:"https://apps.apple.com/us/app/my-name-in-hieroglyphics/id6446391968",
privacy:"My Name in Hieroglyphics does not collect personal data.",
tos:"https://www.apple.com/legal/internet-services/itunes/dev/stdeula/"
},

{
title:"Ipuwer Papyrus",
badge:"$1.99 iOS App",
description:"Explore the ancient Egyptian text known as the Admonitions of Ipuwer.",
video:"vid/ipuwer.mp4",
images:[
"img/ipuwer-papyrus.png"
],
appStore:"https://apps.apple.com/us/app/ipuwer-papyrus/id6474483959",
privacy:"Ipuwer Papyrus works entirely offline and collects no personal information.",
tos:"https://www.apple.com/legal/internet-services/itunes/dev/stdeula/"
},

{
title:"Percentage Calendar",
badge:"$1.99 iOS App",
description:"Visualize the year as a percentage and track life progress.",
video:null,
images:[
"img/percentage-calendar.png"
],
appStore:"https://apps.apple.com/us/app/percentage-calendar/id6708225119",
privacy:"Percentage Calendar stores all calendar data locally.",
tos:"https://www.apple.com/legal/internet-services/itunes/dev/stdeula/"
},

{
title:"Note Gallery",
badge:"Free iOS App",
description:"Capture and organize ideas in a visual gallery.",
video:null,
images:[
"img/note-gallery.png",
"img/note-gallery2.png",
"img/note-gallery3.png",
"img/note-gallery4.png"
],
appStore:"https://apps.apple.com/us/app/note-gallery/id1667996797",
privacy:"Note Gallery does not collect any personal data. All notes remain on device.",
tos:"https://www.apple.com/legal/internet-services/itunes/dev/stdeula/"
}

]

const feed=document.getElementById("feed")

/* PROFILE */

const profileReel=document.createElement("div")
profileReel.className="reel profile"

profileReel.innerHTML=`
<img src="${profile.avatar}">
<h1>${profile.name}</h1>
<p>${profile.handle}</p>
<p>${profile.bio}</p>
<a class="btn" href="mailto:${profile.email}">${profile.email}</a>
`

feed.appendChild(profileReel)

/* APPS */

apps.forEach(app=>{

const reel=document.createElement("div")
reel.className="reel"

const gallery=document.createElement("div")
gallery.className="gallery"

if(app.video){
const video=document.createElement("video")
video.src=app.video
video.controls=true
video.loop=true
video.playsInline=true
gallery.appendChild(video)
}

app.images.forEach(src=>{
const img=document.createElement("img")
img.src=src
gallery.appendChild(img)
})

const info=document.createElement("div")
info.className="info"

info.innerHTML=`
<div class="badge">${app.badge}</div>
<div class="title">${app.title}</div>
<div class="desc">${app.description}</div>
`

const actions=document.createElement("div")
actions.className="actions"

if(app.appStore){
actions.innerHTML+=`<a class="btn" href="${app.appStore}" target="_blank">App Store</a>`
}

if(app.privacy){
actions.innerHTML+=`<button class="btn" onclick="openPrivacy('${app.title}',\`${app.privacy}\`)">Privacy</button>`
}

if(app.tos){
actions.innerHTML+=`<a class="btn" href="${app.tos}" target="_blank">Terms</a>`
}

reel.appendChild(gallery)
reel.appendChild(info)
reel.appendChild(actions)

feed.appendChild(reel)

})

function openPrivacy(title,text){

const modal=document.getElementById("modal")

modal.innerHTML=`
<h2>${title} Privacy Policy</h2>
<p style="margin-top:15px">${text}</p>
<button class="btn" style="margin-top:20px" onclick="closeModal()">Close</button>
`

modal.classList.add("open")

}

function closeModal(){
document.getElementById("modal").classList.remove("open")
}

</script>

</body>
</html>
